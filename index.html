<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Guessr</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #flag-display {
            font-size: 80px;
            margin: 20px 0;
        }

        #map-placeholder {
            width: 100%;
            height: 300px;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #4338ca;
            border: 2px dashed #4338ca;
        }

        input {
            padding: 12px;
            width: 60%;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
        }

        button {
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }

        button:hover {
            background: #4f46e5;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            height: 20px;
        }

        .score {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Guess the Country!</h1>
    <div class="score">Score: <span id="score-val">0</span></div>
    
    <div id="flag-display">🚩</div>
    <div id="map-placeholder">Look at the flag and type the name!</div>

    <div class="input-area">
        <input type="text" id="guess-input" placeholder="Enter country name..." autocomplete="off">
        <button onclick="checkGuess()">Submit</button>
    </div>

    <div id="message"></div>
</div>

<script>
    // Sample data - You can add many more!
    const countries = [
        { name: "France", flag: "🇫🇷" },
        { name: "Japan", flag: "🇯🇵" },
        { name: "Brazil", flag: "🇧🇷" },
        { name: "Egypt", flag: "🇪🇬" },
        { name: "Canada", flag: "🇨🇦" },
        { name: "Australia", flag: "🇦🇺" },
        { name: "Pakistan", flag: "🇵🇰" },
        { name: "United Kingdom", flag: "🇬🇧" }
    ];

    let currentCountry = {};
    let score = 0;

    function nextQuestion() {
        const randomIndex = Math.floor(Math.random() * countries.length);
        currentCountry = countries[randomIndex];
        document.getElementById('flag-display').innerText = currentCountry.flag;
        document.getElementById('guess-input').value = "";
        document.getElementById('message').innerText = "";
        document.getElementById('guess-input').focus();
    }

    function checkGuess() {
        const userGuess = document.getElementById('guess-input').value.trim().toLowerCase();
        const msgElement = document.getElementById('message');
        
        if (userGuess === currentCountry.name.toLowerCase()) {
            msgElement.innerText = "Correct! 🎉";
            msgElement.style.color = "green";
            score++;
            document.getElementById('score-val').innerText = score;
            setTimeout(nextQuestion, 1500);
        } else {
            msgElement.innerText = "Try again! ❌";
            msgElement.style.color = "red";
        }
    }

    // Allow pressing "Enter" to submit
    document.getElementById('guess-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkGuess();
        }
    });

    // Start the game
    nextQuestion();
</script>

</body>
</html>
